<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1d27" id="theme-color-meta">
<title>STOCKR</title>
<script>
// 描画前にテーマを確定させ、フラッシュ（一瞬違う配色が見える現象）を防ぐ
(function(){
  try {
    var t = localStorage.getItem('stockr_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  } catch(e) {}
})();
</script>
<style>
/* ==================== VARIABLES ==================== */
:root {
  --bg:       #1a1d27;
  --surface:  #22263a;
  --surface2: #2c3150;
  --accent:   #00e5a0;
  --accent-d: #00b87e;
  --text:     #eef0f8;
  --muted:    #7a82a0;
  --danger:   #ff4d6a;
  --warn:     #ffb347;
  --border:   #32374f;
  --radius:   12px;
  --nav-h:    64px;
  --accent-tint-weak:   rgba(0,229,160,0.07);
  --accent-tint:        rgba(0,229,160,0.12);
  --accent-shadow:      rgba(0,229,160,0.35);
  --danger-tint-weak:   rgba(255,77,106,0.10);
  --danger-tint:        rgba(255,77,106,0.12);
  --danger-tint-strong: rgba(255,77,106,0.30);
  --warn-tint:          rgba(255,179,71,0.08);
  --set-tint:           rgba(140,140,255,0.12);
  --shadow-soft:        rgba(0,0,0,0.30);
  --overlay-bg:         rgba(0,0,0,0.65);
  --on-accent-soft:     rgba(26,29,39,0.60);
}
/* ==================== ライトテーマ（白・ベージュ基調） ==================== */
:root[data-theme="light"] {
  --bg:       #f7f3ea;
  --surface:  #ffffff;
  --surface2: #f1ebdc;
  --accent:   #16a06c;
  --accent-d: #0f8a5c;
  --text:     #2c2a25;
  --muted:    #8c8473;
  --danger:   #d6304f;
  --warn:     #b56a12;
  --border:   #e6ddc8;
  --accent-tint-weak:   rgba(22,160,108,0.08);
  --accent-tint:        rgba(22,160,108,0.13);
  --accent-shadow:      rgba(22,160,108,0.25);
  --danger-tint-weak:   rgba(214,48,79,0.08);
  --danger-tint:        rgba(214,48,79,0.12);
  --danger-tint-strong: rgba(214,48,79,0.25);
  --warn-tint:          rgba(181,106,18,0.10);
  --set-tint:           rgba(95,95,214,0.13);
  --shadow-soft:        rgba(0,0,0,0.10);
  --overlay-bg:         rgba(0,0,0,0.45);
  --on-accent-soft:     rgba(247,243,234,0.80);
}

/* ==================== RESET & BASE ==================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; background: var(--bg); /* テーマに応じた背景色（iOS白フラッシュ防止） */ }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
  height: 100%;
  max-width: 600px;
  margin: 0 auto;
  overflow: hidden;
}
button { cursor: pointer; font-family: inherit; }
input { font-family: inherit; }

/* ==================== LAYOUT ==================== */
#app { height: 100vh; display: flex; flex-direction: column; }
.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + 16px);
}
.screen.no-pad { padding-bottom: 0; }

/* ==================== TOP BAR ==================== */
.topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  min-height: 52px;
}
.topbar-logo { font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 3px; }
.topbar-title { font-size: 16px; font-weight: 600; color: var(--text); }
.topbar-sub { color: var(--muted); font-size: 13px; margin-left: auto; }
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 24px; padding: 0 4px; line-height: 1; flex-shrink: 0;
}

/* ==================== BOTTOM NAV ==================== */
.bottomnav {
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; background: none; border: none;
  color: var(--muted); font-size: 11px;
  transition: color 0.15s;
  padding: 8px 4px;
}
.nav-btn .ni { font-size: 22px; line-height: 1; }
.nav-btn.active { color: var(--accent); }

/* ==================== CARDS ==================== */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin: 0 12px 10px;
}
.card-title {
  font-size: 11px; color: var(--muted); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px;
}

/* ==================== BUTTONS ==================== */
.btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; padding: 14px 16px;
  border-radius: var(--radius); border: none;
  font-size: 16px; font-weight: 600;
  transition: opacity 0.15s, transform 0.1s;
  gap: 6px;
}
.btn:active { opacity: 0.8; transform: scale(0.98); }
.btn-primary  { background: var(--accent); color: var(--bg); }
.btn-secondary{ background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-danger   { background: var(--danger); color: #fff; }
.btn-ghost    { background: var(--danger-tint); color: var(--danger); border: 1px solid var(--danger-tint-strong); }
.btn + .btn   { margin-top: 8px; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ==================== FORM ==================== */
.form-group { margin-bottom: 16px; }
.form-label  { display: block; font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
.form-input  {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); padding: 12px 14px;
  font-size: 16px; outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }
.form-hint { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.4; }
.form-req { color: var(--danger); }

/* ==================== SEARCH BAR ==================== */
.search-wrap {
  display: flex; gap: 8px; padding: 8px 12px 6px;
  background: var(--bg); position: sticky; top: 0; z-index: 8;
  border-bottom: 1px solid var(--border);
}
.search-input {
  flex: 1; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); padding: 9px 14px;
  font-size: 15px; outline: none; transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.sort-btn {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
  color: var(--muted); padding: 9px 12px; font-size: 13px; white-space: nowrap;
}

/* ==================== PRODUCT ITEM ==================== */
.product-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 16px; margin: 0 12px 8px;
  border: 1.5px solid transparent; transition: border-color 0.15s;
  cursor: pointer;
}
.product-item:active { background: var(--surface2); }
.product-item.low { border-color: var(--warn); }
.pi-info { flex: 1; min-width: 0; }
.pi-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pi-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.pi-qty-wrap { text-align: right; flex-shrink: 0; }
.pi-qty { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; }
.pi-qty.low { color: var(--warn); }
.pi-unit { font-size: 11px; color: var(--muted); }
.pi-btns { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
.qbtn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 18px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s;
}
.qbtn:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* ==================== ALERT BANNER ==================== */
.alert-banner {
  display: flex; align-items: center; gap: 10px;
  background: var(--warn-tint); border: 1.5px solid var(--warn);
  border-radius: var(--radius); padding: 12px 14px;
  margin: 8px 12px 4px; cursor: pointer;
}
.alert-banner .ab-icon { font-size: 18px; }
.alert-banner .ab-text { flex: 1; font-size: 13px; }
.alert-banner strong { color: var(--warn); }
.alert-badge {
  display: inline-block; background: var(--warn); color: var(--bg);
  font-size: 10px; font-weight: 800; padding: 1px 5px;
  border-radius: 4px; margin-left: 5px; vertical-align: middle;
}

/* ==================== FILTER PILLS ==================== */
.pills {
  display: flex; gap: 8px; padding: 8px 12px 6px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  border-bottom: 1px solid var(--border);
}
.pills::-webkit-scrollbar { display: none; }
.pill {
  padding: 6px 14px; border-radius: 20px; font-size: 13px;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--muted); white-space: nowrap; transition: all 0.15s;
}
.pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

/* ==================== SECTION HEADER ==================== */
.sect-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px 4px;
}
.sect-title { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

/* ==================== FAB ==================== */
.fab {
  position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--accent); color: var(--bg); font-size: 26px; border: none;
  box-shadow: 0 4px 20px var(--accent-shadow);
  display: flex; align-items: center; justify-content: center;
  z-index: 50; transition: transform 0.15s;
}
.fab:active { transform: scale(0.9); }
.fab-sub {
  position: fixed; bottom: calc(var(--nav-h) + 80px); right: 18px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--surface2); color: var(--accent); font-size: 18px; border: 1.5px solid var(--accent);
  box-shadow: 0 2px 12px var(--shadow-soft);
  display: flex; align-items: center; justify-content: center;
  z-index: 50; transition: transform 0.15s;
}
.fab-sub:active { transform: scale(0.9); }

/* ==================== SKELETON LOADING ==================== */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skel {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px;
}

/* ==================== LOADING & EMPTY ==================== */
.loading { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 48px 24px; color: var(--muted); font-size: 14px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 56px 24px; color: var(--muted); }
.empty .ei { font-size: 48px; margin-bottom: 14px; }
.empty p { font-size: 14px; line-height: 1.6; }

/* ==================== TOAST ==================== */
#toast-wrap { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 360px; pointer-events: none; }
.toast {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 24px; padding: 10px 18px;
  font-size: 14px; font-weight: 500; text-align: center;
  opacity: 0; transform: translateY(-8px);
  transition: opacity 0.2s, transform 0.2s;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok   { border-color: var(--accent); color: var(--accent); }
.toast.err  { border-color: var(--danger); color: var(--danger); }
.toast.info { border-color: var(--muted); color: var(--text); }

/* ==================== OVERLAY / MODAL ==================== */
.overlay {
  position: fixed; inset: 0; background: var(--overlay-bg);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
}
.modal {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 600px; padding: 20px 20px 32px;
  max-height: 90vh; overflow-y: auto;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }

/* ==================== SETUP SCREEN ==================== */
.setup-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
.setup-logo { font-size: 52px; font-weight: 900; color: var(--accent); letter-spacing: 6px; }
.setup-tag  { color: var(--muted); font-size: 13px; margin: 8px 0 40px; }
.setup-form { width: 100%; max-width: 360px; }

/* ==================== STOCK ACTION (NUMPAD) ==================== */
.action-wrap { padding: 12px 16px 16px; }
.qty-display { text-align: center; padding: 16px 0 12px; }
.qty-display .ql { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.qty-display .qn { font-size: 68px; font-weight: 900; color: var(--accent); line-height: 1; }
.qty-display .qu { font-size: 15px; color: var(--muted); }
.qty-display .qa { font-size: 12px; color: var(--warn); margin-top: 4px; }
.mode-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.mode-tab {
  padding: 11px 8px; background: var(--surface); border: 2px solid var(--border);
  border-radius: 10px; color: var(--muted); font-size: 14px; font-weight: 600;
  text-align: center; transition: all 0.15s;
}
.mode-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-tint-weak); }
.action-display {
  background: var(--surface); border-radius: var(--radius);
  font-size: 44px; font-weight: 800; color: var(--accent);
  text-align: center; padding: 12px 16px; letter-spacing: 2px;
  margin-bottom: 10px; min-height: 72px;
}
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 12px; }
.nk {
  height: 54px; background: var(--surface2); border: none;
  border-radius: 10px; color: var(--text); font-size: 22px; font-weight: 500;
  transition: background 0.1s;
}
.nk:active { background: var(--surface); }
.nk.wide { grid-column: span 2; }
.nk.accent { background: var(--accent); color: var(--bg); font-size: 18px; font-weight: 700; }
.nk.accent:active { background: var(--accent-d); }
.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.action-extras { margin-top: 4px; }
.extras-toggle { font-size: 12px; color: var(--muted); text-align: center; padding: 4px 0 12px; cursor: pointer; }
.product-actions-row { display: flex; gap: 8px; justify-content: flex-end; }
.icon-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 8px 12px; border-radius: 8px; font-size: 13px; border: none;
  transition: opacity 0.15s;
}
.icon-btn:active { opacity: 0.7; }
.icon-btn.edit   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.icon-btn.delete { background: var(--danger-tint-weak); color: var(--danger); }

/* ==================== HISTORY ==================== */
.hist-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.hist-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.hist-icon.in  { background: var(--accent-tint); }
.hist-icon.out { background: var(--danger-tint); }
.hist-icon.set { background: var(--set-tint); }
.hist-body { flex: 1; min-width: 0; }
.hist-name { font-weight: 600; font-size: 14px; }
.hist-meta { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
.hist-right { text-align: right; flex-shrink: 0; }
.hist-num { font-size: 20px; font-weight: 800; }
.hist-num.in  { color: var(--accent); }
.hist-num.out { color: var(--danger); }
.hist-num.set { color: #9090ff; }
.hist-after { font-size: 11px; color: var(--muted); }

/* ==================== UNIT PILLS ==================== */
.unit-pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.unit-pill {
  padding: 5px 12px; border-radius: 16px; font-size: 13px;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--muted); transition: all 0.12s;
}
.unit-pill.active { background: var(--accent-tint); border-color: var(--accent); color: var(--accent); font-weight: 600; }

</style>
</head>
<body>
<div id="app"></div>
<div id="toast-wrap"></div>

<script>
// ============================================================
// STATE
// ============================================================
const S = {
  url:        localStorage.getItem('stockr_url')         || '',
  user:       localStorage.getItem('stockr_user')        || '',
  sort:       localStorage.getItem('stockr_sort')        || 'name',
  theme:      localStorage.getItem('stockr_theme')        || 'dark',
  screen: 'home',
  query:  '',
  filterMode: '', // '' = 全件 / 'soon' = 20日以内
  histFilter: 'all',
  histSearch: '',
  // Stock action
  activeProduct: null,
  actionMode:    'in',
  actionInput:   '',
  // Add/edit
  editProduct: null,
  preBarcode:  '',
  preName:     '',
  saving: false,
  confirmLock: false, // 確定ボタンの連打防止
  confirmLockTimer: null,
  quickLock: {}, // ＋/－ボタンの連続クリック防止
  // Cache
  cache:     null,
  cacheTime: 0,
  CACHE_TTL: 300000, // 5分キャッシュ
  // Shopping mode
  viewMode: 'home',   // 'home' | 'shop'
  shopFlags: new Set(JSON.parse(localStorage.getItem('stockr_shop_flags') || '[]')),
  // 複数人更新通知
  lastSeenTime: parseInt(localStorage.getItem('stockr_last_seen') || '0'),
  // 店舗名管理（非表示リスト）
  storeIgnoreList: JSON.parse(localStorage.getItem('stockr_ignored_stores') || '[]'),
  // カテゴリ（group_id → 'food' | 'daily' | ''）
  categoryMap: JSON.parse(localStorage.getItem('stockr_categories') || '{}'),
  categoryFilter: '',  // '' = 全件 / 'food' = 食品 / 'daily' = 日用品
};

// ============================================================
// API
// ============================================================
async function apiGet(action, params = {}) {
  const qs  = Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
  const url = `${S.url}?action=${action}${qs ? '&'+qs : ''}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(S.url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
// ============================================================
// SHOP FLAGS
// ============================================================
function saveShopFlags() {
  try { localStorage.setItem('stockr_shop_flags', JSON.stringify([...S.shopFlags])); } catch(e) {}
}

// ─── ローカルキャッシュ即時保存 ──────────────────────────────────
function saveLocalCache() {
  try { localStorage.setItem('stockr_cache', JSON.stringify({data: S.cache, time: Date.now()})); } catch(e) {}
}
// バックグラウンドでGASから最新データ取得（await不要・UI更新）
function bgRefresh() {
  getAllData(true).then(d => { if (d?.ok) { S.cache = d; paintHomeList?.(); } }).catch(()=>{});
}

async function getAllData(force = false) {
  if (!S.url || S.url === 'DEMO') return S.cache;
  const now = Date.now();
  if (!force && S.cache && now - S.cacheTime < S.CACHE_TTL) return S.cache;
  try {
    const data = await apiGet('getAll');
    if (data.ok) {
      S.cache = data; S.cacheTime = now;
      try { localStorage.setItem('stockr_cache', JSON.stringify({ data, time: now })); } catch(e) {}
    }
    return data;
  } catch(e) { return { ok: false, error: e.message }; }
}

// ============================================================
// 複数人更新通知
// ============================================================
function checkMultiUserUpdates(data) {
  if (!data?.ok || !S.user || S.url === 'DEMO') return;
  const now = Date.now();
  const since = S.lastSeenTime;
  S.lastSeenTime = now;
  try { localStorage.setItem('stockr_last_seen', String(now)); } catch(e) {}
  if (!since) return; // 初回起動時は通知しない
  const newByOther = (data.history || []).filter(h => {
    if (!h.timestamp || !h.user || h.user === S.user) return false;
    return new Date(h.timestamp).getTime() > since;
  });
  if (!newByOther.length) return;
  const byUser = {};
  newByOther.forEach(h => { byUser[h.user] = (byUser[h.user] || 0) + 1; });
  Object.entries(byUser).forEach(([user, count]) => {
    setTimeout(() => toast(`👥 ${user} が ${count}件更新しました`, 'info'), 400);
  });
}

// Build merged product rows (products + inventory + latest price)
function buildProducts(data) {
  if (!data?.products) return [];
  const invMap = {};
  (data.inventory || []).forEach(r => { invMap[r.group_id] = r; });
  // バーコードテーブルから商品ごとの最新価格を取得
  const priceMap = {};
  (data.barcodes || []).forEach(b => {
    if (b.price && Number(b.price) > 0) priceMap[b.group_id] = Number(b.price);
  });
  // 購入履歴からも最新の入庫価格・店舗を補完（バーコードにない場合）
  const histPriceMap = {}, histStoreMap = {};
  (data.history || [])
    .filter(h => h.action === 'in' && h.price && Number(h.price) > 0)
    .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp))
    .forEach(h => {
      histPriceMap[h.group_id] = Number(h.price);
      if (h.store_name) histStoreMap[h.group_id] = h.store_name;
    });
  return (data.products || []).map(p => {
    const inv      = invMap[p.group_id] || {};
    const qty      = Number(inv.qty) || 0;
    const thr      = (inv.alert_threshold != null && inv.alert_threshold !== '') ? Number(inv.alert_threshold) : 0;
    const alertMode = String(inv.alert_mode || 'threshold');
    const trackStock = (p.track_stock === '' || p.track_stock == null) ? true : (Number(p.track_stock) !== 0);
    const manualDaysPerUnit = Number(p.manual_days_per_unit) || 0;
    const latestPrice = priceMap[p.group_id] || histPriceMap[p.group_id] || 0;
    const latestStore = histStoreMap[p.group_id] || '';
    const volume = Number(p.volume) || 0;
    const unitPrice  = (latestPrice > 0 && volume > 0) ? latestPrice / volume : null;
    const stockValue = latestPrice > 0 ? qty * latestPrice : null;
    // 仮想消費量: 「消費日数モード」の時だけ有効（しきい値/管理しないに切替えたら即停止）
    const virtualQty = (() => {
      if (alertMode !== 'days') return null;
      if (!manualDaysPerUnit || manualDaysPerUnit <= 0 || !inv.updated_at) return null;
      const lastUpdate = new Date(inv.updated_at);
      if (isNaN(lastUpdate.getTime())) return null;
      const daysPassed = (Date.now() - lastUpdate.getTime()) / 86400000;
      return Math.round(Math.max(0, qty - daysPassed / manualDaysPerUnit) * 10) / 10;
    })();
    const displayQty = virtualQty !== null ? virtualQty : qty;
    const isLow = alertMode === 'threshold' && trackStock && displayQty <= thr;
    return { ...p, qty, displayQty, virtualQty, alert_threshold: thr, alert_mode: alertMode, track_stock: trackStock, manual_days_per_unit: manualDaysPerUnit, updated_at: inv.updated_at || '', isLow, latestPrice, latestStore, volume, unitPrice, stockValue };
  });
}

// 在庫の価格サマリーを計算
function calcPriceSummary(prods) {
  const withPrice = prods.filter(p => p.stockValue !== null);
  if (!withPrice.length) return null;
  const total = withPrice.reduce((s, p) => s + p.stockValue, 0);
  return { total, count: withPrice.length, total_items: prods.length };
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add('show'); }); });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 2400);
}

// ============================================================
// UTILS
// ============================================================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function relDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return String(s).slice(0,10);
  const diff = Date.now() - d;
  if (diff < 60000)    return 'たった今';
  if (diff < 3600000)  return `${Math.floor(diff/60000)}分前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}時間前`;
  if (diff < 604800000)return `${Math.floor(diff/86400000)}日前`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ROUTER
// ============================================================
function go(screen, params = {}) {
  S.saving = false; // 画面移動時に必ずリセット
  Object.assign(S, params);
  S.screen = screen;
  render();
}

// ============================================================
// RENDER ROOT
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (!S.url || !S.user) { app.innerHTML = renderSetup(); bindSetup(); return; }

  const body = {
    home:     renderHome,
    action:   renderAction,
    add:      renderAdd,
    history:  renderHistory,
    settings: renderSettings,
  }[S.screen] || renderHome;

  app.innerHTML = `
    <div class="topbar">${renderTopbar()}</div>
    <div class="screen" id="sc">${body()}</div>
    <nav class="bottomnav">${renderNav()}</nav>
  `;

  document.querySelectorAll('[data-nav]').forEach(b => {
    b.addEventListener('click', () => go(b.dataset.nav));
  });

  ({
    home:    bindHome,
    action:  bindAction,
    add:     bindAdd,
    history: bindHistory,
    settings:bindSettings,
  }[S.screen] || bindHome)();
}

function renderTopbar() {
  const titles = { home:'', action:'', add: S.editProduct?'商品を編集':'商品を追加', history:'操作履歴', settings:'設定' };
  const back = ['action','add'].includes(S.screen)
    ? `<button class="back-btn" id="back-btn">‹</button>` : '';
  const main = S.screen === 'home' || S.screen === 'history' || S.screen === 'settings'
    ? `<span class="topbar-logo">STOCKR</span>` : '';
  const title = !['home'].includes(S.screen) ? `<span class="topbar-title">${titles[S.screen]||''}</span>` : '';

  if (S.screen === 'action' && S.activeProduct) {
    return `${back}<span class="topbar-title" style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(S.activeProduct.name)}</span>`;
  }
  // ホーム画面：在庫資産をトップバーに常時表示
  if (S.screen === 'home') {
    const prods = S.cache?.ok ? buildProducts(S.cache) : [];
    const summary = calcPriceSummary(prods);
    const right = summary
      ? `<div style="text-align:right;line-height:1.2;margin-left:auto;">
           <div style="font-size:10px;color:var(--muted);">在庫資産</div>
           <div style="font-size:15px;font-weight:800;color:var(--accent);">¥${Math.round(summary.total).toLocaleString()}</div>
         </div>`
      : `<span class="topbar-sub">👤 ${esc(S.user)}</span>`;
    return `${main}${right}`;
  }
  const sub = `<span class="topbar-sub">👤 ${esc(S.user)}</span>`;
  return `${back}${main}${title}${sub}`;
}

// 登録済み店舗名の一覧を取得（バーコード＋履歴から収集、非表示リストを除外）
function getUniqueStores() {
  const stores = new Set();
  (S.cache?.barcodes || []).forEach(b => { if (b.store_name) stores.add(String(b.store_name)); });
  (S.cache?.history  || []).forEach(h => { if (h.store_name) stores.add(String(h.store_name)); });
  return [...stores].filter(s => !S.storeIgnoreList.includes(s)).sort();
}

// 過去に使った容量単位 + デフォルト一覧
function getUsedVolumeUnits() {
  const base = ['ml', 'L', 'g', 'kg', 'oz'];
  const used = new Set(base);
  (S.cache?.products || []).forEach(p => { if (p.volume_unit) used.add(p.volume_unit); });
  return [...used];
}

// 消費統計を計算（出庫ベース + 入庫サイクルベース）
function calcConsumptionStats(p) {
  const hist = (S.cache?.history || []).filter(h => String(h.group_id) === String(p.group_id));
  const outHist = hist.filter(h => h.action === 'out').sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
  const inHist  = hist.filter(h => h.action === 'in').sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
  let daysFromOut = null, daysFromIn = null, avgDaysPerUnit = null, purchaseCycleDays = null;
  // 仮想消費量を優先（manual_days_per_unit設定時はdisplayQtyを使う）
  const dQty = p.displayQty !== undefined ? p.displayQty : p.qty;

  // 出庫ペースから計算（より信頼性が高い）
  if (outHist.length >= 2) {
    const days = (new Date(outHist[outHist.length-1].timestamp) - new Date(outHist[0].timestamp)) / 86400000;
    const totalOut = outHist.reduce((s,h) => s + (Number(h.qty)||0), 0);
    if (days >= 1 && totalOut > 0) {
      const perDay = totalOut / days;
      daysFromOut = Math.floor(dQty / perDay);
      avgDaysPerUnit = 1 / perDay;
    }
  }

  // 入庫サイクルから消費速度を推定（出庫記録がない場合のフォールバック）
  if (inHist.length >= 2) {
    const intervals = [];
    for (let i = 1; i < inHist.length; i++) {
      const iv = (new Date(inHist[i].timestamp) - new Date(inHist[i-1].timestamp)) / 86400000;
      if (iv > 0) intervals.push(iv);
    }
    if (intervals.length) {
      purchaseCycleDays = intervals.reduce((s,d) => s+d, 0) / intervals.length;
      const totalBought = inHist.reduce((s,h) => s + (Number(h.qty)||0), 0);
      const avgQtyPerPurchase = totalBought / inHist.length;
      const perDayIn = avgQtyPerPurchase / purchaseCycleDays;
      if (perDayIn > 0) {
        daysFromIn = Math.round(dQty / perDayIn);
        if (avgDaysPerUnit === null) avgDaysPerUnit = 1 / perDayIn;
      }
    }
  }

  const estBestDays = daysFromOut ?? daysFromIn;
  // 手動設定の消費日数は「消費日数モード」の時だけ優先（モード切替後は履歴ベースの推定にフォールバック）
  const manualDays = (p.alert_mode === 'days') ? (Number(p.manual_days_per_unit) || 0) : 0;
  const manualBestDays = manualDays > 0 ? Math.round(dQty * manualDays) : null;
  const bestDays = manualBestDays ?? estBestDays;
  return { daysFromOut, daysFromIn, avgDaysPerUnit, purchaseCycleDays, bestDays, manualBestDays, estBestDays };
}

// 後方互換
function calcDaysRemaining(p) { return calcConsumptionStats(p).bestDays; }

// ── 購入サイクル自動計算 ───────────────────────────────────────────
// 入庫履歴から「何日ごとに購入しているか」を算出し、次回予定日と偏差を返す
function calcPurchaseCycle(p) {
  if (!p.track_stock) return null;
  const hist = (S.cache?.history || [])
    .filter(h => String(h.group_id) === String(p.group_id) && h.action === 'in')
    .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
  if (hist.length < 2) return null;
  const intervals = [];
  for (let i = 1; i < hist.length; i++) {
    const iv = (new Date(hist[i].timestamp) - new Date(hist[i-1].timestamp)) / 86400000;
    if (iv >= 1) intervals.push(iv);
  }
  if (!intervals.length) return null;
  const avgCycleDays = intervals.reduce((s,d) => s+d, 0) / intervals.length;
  const lastIn = new Date(hist[hist.length-1].timestamp);
  const nextDue = new Date(lastIn.getTime() + avgCycleDays * 86400000);
  const daysUntilDue = Math.round((nextDue - new Date()) / 86400000);
  const totalQty = hist.reduce((s,h) => s + (Number(h.qty)||0), 0);
  const avgQtyPerPurchase = totalQty / hist.length;
  const suggestedDaysPerUnit = avgQtyPerPurchase > 0 ? Math.round((avgCycleDays / avgQtyPerPurchase) * 10) / 10 : null;
  let deviationPct = null;
  if (p.manual_days_per_unit > 0 && suggestedDaysPerUnit) {
    deviationPct = Math.round(((suggestedDaysPerUnit - p.manual_days_per_unit) / p.manual_days_per_unit) * 100);
  }
  return { avgCycleDays: Math.round(avgCycleDays), lastIn, nextDue, daysUntilDue,
           histCount: hist.length, avgQtyPerPurchase: Math.round(avgQtyPerPurchase*10)/10,
           suggestedDaysPerUnit, deviationPct };
}

// 商品ごとの店舗別価格履歴を集計（購入履歴 + バーコードテーブル）
function calcStorePrices(p) {
  const storeMap = {};
  // 購入履歴から集計（より新鮮）
  (S.cache?.history || [])
    .filter(h => String(h.group_id) === String(p.group_id) && h.action === 'in' && h.store_name && Number(h.price) > 0)
    .forEach(h => {
      const store = h.store_name, price = Number(h.price);
      if (!storeMap[store]) storeMap[store] = { prices: [], latestPrice: 0, latestDate: '' };
      storeMap[store].prices.push(price);
      if (!storeMap[store].latestDate || new Date(h.timestamp) > new Date(storeMap[store].latestDate)) {
        storeMap[store].latestPrice = price;
        storeMap[store].latestDate = h.timestamp;
      }
    });
  // バーコードテーブルで補完（履歴にない店舗）
  (S.cache?.barcodes || [])
    .filter(b => String(b.group_id) === String(p.group_id) && b.store_name && Number(b.price) > 0)
    .forEach(b => {
      const store = b.store_name, price = Number(b.price);
      if (!storeMap[store]) storeMap[store] = { prices: [price], latestPrice: price, latestDate: b.created_at||'' };
    });
  return Object.entries(storeMap).map(([store, d]) => {
    const min = Math.min(...d.prices), max = Math.max(...d.prices);
    const avg = d.prices.reduce((s,x) => s+x, 0) / d.prices.length;
    const unitPrice = (Number(p.volume) > 0 && min > 0) ? min / Number(p.volume) : null;
    return { store, min, max, avg, latestPrice: d.latestPrice, count: d.prices.length, unitPrice };
  }).sort((a,b) => a.min - b.min);
}

// 店舗別買い物リスト（各商品の最安値店舗でグループ化）
function showShoppingList() {
  const prods = S.cache?.ok ? buildProducts(S.cache) : [];

  // 各商品の最安値店舗を特定してグループ化
  const storeGroups = {}; // storeName -> [enrichedProduct]
  prods.forEach(p => {
    const storePrices = calcStorePrices(p);
    const cheapest    = storePrices[0];
    const storeName   = cheapest ? cheapest.store : '（店舗未設定）';
    const stats       = calcConsumptionStats(p);
    if (!storeGroups[storeName]) storeGroups[storeName] = [];
    storeGroups[storeName].push({
      ...p,
      cheapestPrice:  cheapest?.min  || null,
      allStorePrices: storePrices,
      daysLeft:       stats.bestDays,
    });
  });

  // アイテムを「要購入優先 → 在庫少ない順」にソート
  const sortItems = items => [...items].sort((a, b) => {
    const urgA = (a.isLow || (a.daysLeft !== null && a.daysLeft < 7)) ? 0 : 1;
    const urgB = (b.isLow || (b.daysLeft !== null && b.daysLeft < 7)) ? 0 : 1;
    return urgA !== urgB ? urgA - urgB : a.qty - b.qty;
  });

  // 店舗順: 実店舗を五十音順、未設定を末尾
  const storeOrder = Object.keys(storeGroups).sort((a, b) => {
    if (a === '（店舗未設定）') return 1;
    if (b === '（店舗未設定）') return -1;
    return a.localeCompare(b, 'ja');
  });

  const content = storeOrder.map(store => {
    const items       = sortItems(storeGroups[store]);
    const urgentCount = items.filter(p => p.isLow || (p.daysLeft !== null && p.daysLeft < 7)).length;
    const isUnset     = store === '（店舗未設定）';
    return `
      <div style="margin-bottom:18px;">
        <div style="font-weight:700;color:${isUnset?'var(--muted)':'var(--accent)'};font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          ${isUnset ? '❓' : '🏪'} ${esc(store)}
          <span style="font-size:11px;color:var(--muted);font-weight:400;">${items.length}品</span>
          ${urgentCount > 0 ? `<span style="font-size:10px;background:var(--warn);color:var(--bg);font-weight:700;padding:2px 7px;border-radius:8px;">🛒 要購入 ${urgentCount}</span>` : ''}
        </div>
        ${items.map(p => {
          const urgent   = p.isLow || (p.daysLeft !== null && p.daysLeft < 7);
          const daysCol  = p.daysLeft === null ? '' : p.daysLeft < 7 ? 'var(--danger)' : p.daysLeft < 30 ? 'var(--warn)' : 'var(--accent)';
          const otherStr = p.allStorePrices.length > 1
            ? p.allStorePrices.slice(1, 3).map(s => `${esc(s.store)} ¥${s.min.toLocaleString()}`).join('、')
            : '';
          return `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--surface2);border-radius:9px;margin-bottom:5px;border:1.5px solid ${urgent ? 'var(--warn)' : 'transparent'};">
            <div style="min-width:0;flex:1;">
              <div style="font-size:14px;font-weight:600;">${esc(p.name)}${p.isLow ? '<span class="alert-badge">少</span>' : ''}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">
                在庫 ${p.qty}${esc(p.unit)}
                ${p.cheapestPrice ? ` · <span style="color:var(--accent);font-weight:700;">¥${Number(p.cheapestPrice).toLocaleString()}</span>` : ''}
                ${p.daysLeft !== null ? ` · <span style="color:${daysCol};">あと約${p.daysLeft}日</span>` : ''}
              </div>
              ${otherStr ? `<div style="font-size:10px;color:var(--muted);margin-top:2px;">他店: ${otherStr}</div>` : ''}
            </div>
            <span style="font-size:20px;margin-left:8px;flex-shrink:0;">${urgent ? '🛒' : '<span style="opacity:0.25;">✓</span>'}</span>
          </div>`;
        }).join('')}
      </div>`;
  }).join('');

  const ov = document.createElement('div'); ov.className = 'overlay';
  ov.innerHTML = `<div class="modal"><div class="modal-handle"></div>
    <h2>🛒 最安値店舗別リスト</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px;">各商品を最安値で買える店舗にまとめました。🛒は在庫少または残日数7日以内</p>
    <div style="max-height:62vh;overflow-y:auto;">
      ${content || '<div class="empty" style="padding:32px 0;"><div class="ei">🏪</div><p>店舗情報がまだ登録されていません<br>入庫時に店舗名・価格を入力してください</p></div>'}
    </div>
    <button class="btn btn-secondary" id="sl-close" style="margin-top:12px;">閉じる</button>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('sl-close').addEventListener('click', () => ov.remove());
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

  // ── 買い物モード HTML ─────────────────────────────────────────
  if (S.viewMode === 'shop') {
    const allProds = prods; // フラグ検索用に全件保持
    prods = prods.filter(p => {
      if (S.shopFlags.has(String(p.group_id))) return true;
      if (!p.track_stock) return false;
      if (p.isLow) return true;
      const dr = calcDaysRemaining(p);
      return dr !== null && dr <= 20;
    });
    prods.sort((a, b) => {
      const aManual = S.shopFlags.has(String(a.group_id)) && !a.track_stock;
      const bManual = S.shopFlags.has(String(b.group_id)) && !b.track_stock;
      if (aManual !== bManual) return aManual ? 1 : -1;
      const aDr = a.track_stock ? (calcDaysRemaining(a) ?? 9999) : 9999;
      const bDr = b.track_stock ? (calcDaysRemaining(b) ?? 9999) : 9999;
      return aDr - bDr;
    });
    // 買い物モード: 上部に「＋ 追加」ボタン
    const addBtnHtml = `<div style="padding:10px 16px 4px;text-align:right;">
      <button id="shop-add-btn" class="btn btn-secondary" style="font-size:13px;padding:8px 16px;">＋ 商品を追加</button>
    </div>`;
    let html = addBtnHtml;
    if (!prods.length) {
      html += `<div class="empty" style="padding-top:16px;"><div class="ei">🛒</div><p>買い物リストは空です<br><span style="font-size:12px;">「＋ 商品を追加」か在庫画面の 🛒 で追加できます</span></p></div>`;
    } else {
      // 店舗別にグループ化
      const storeGroups = {}; // storeName -> [p]
      prods.forEach(p => {
        const store = p.latestStore || '（店舗未設定）';
        if (!storeGroups[store]) storeGroups[store] = [];
        storeGroups[store].push(p);
      });
      // 店舗順：実店舗を五十音順、未設定を末尾
      const storeOrder = Object.keys(storeGroups).sort((a, b) => {
        if (a === '（店舗未設定）') return 1;
        if (b === '（店舗未設定）') return -1;
        return a.localeCompare(b, 'ja');
      });
      // 各グループのアイテムHTML — 商品名・価格・内容量を一目でわかる形に整理
      const shopItemHtml = p => {
        const dr = p.track_stock ? calcDaysRemaining(p) : null;
        const drColor = dr === null ? '' : dr <= 3 ? 'var(--danger)' : dr <= 10 ? 'var(--warn)' : 'var(--muted)';
        const urgency = dr !== null
          ? `<span style="font-size:11px;font-weight:700;color:${drColor};white-space:nowrap;flex-shrink:0;">残${dr}日</span>`
          : (p.isLow ? `<span style="font-size:11px;font-weight:700;color:var(--danger);flex-shrink:0;">残少</span>` : '');
        const volDisp = Number(p.volume) > 0 ? `${p.volume}${esc(p.volume_unit||'')}` : '';
        const isFlagged = S.shopFlags.has(String(p.group_id));
        return `
        <div class="product-item" data-gid="${p.group_id}" style="padding:12px 16px;border-bottom:1px solid var(--border);border-radius:0;margin:0;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
              <div style="font-weight:700;font-size:15px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.name)}</div>
              ${urgency}
            </div>
            <div style="font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
              💴 ${p.latestPrice ? `<strong style="color:var(--text);">¥${p.latestPrice.toLocaleString()}</strong>` : '未登録'}${volDisp ? ` ・ 📦 ${esc(volDisp)}` : ''}
            </div>
          </div>
          ${isFlagged ? `<button class="shop-remove" data-gid="${p.group_id}" title="リストから外す" style="flex-shrink:0;background:none;border:none;color:var(--muted);font-size:18px;line-height:1;padding:4px 2px;">✕</button>` : ''}
          <button class="shop-buy btn btn-primary" data-gid="${p.group_id}" style="flex-shrink:0;width:auto;padding:11px 16px;font-size:14px;white-space:nowrap;">${p.track_stock ? '📥 入庫' : '✓ 買った'}</button>
        </div>`;
      };
      html += storeOrder.map(store => {
        const items = storeGroups[store];
        const isUnset = store === '（店舗未設定）';
        return `
          <div style="padding:6px 16px 4px;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:5;">
            <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:${isUnset?'var(--muted)':'var(--accent)'};">${isUnset?'❓':'🏪'} ${esc(store)}</span>
            <span style="font-size:11px;color:var(--muted);margin-left:6px;">${items.length}品</span>
          </div>
          ${items.map(p => shopItemHtml(p)).join('')}`;
      }).join('');
    }
    el.innerHTML = html;
    // 「＋ 商品を追加」ボタン
    document.getElementById('shop-add-btn')?.addEventListener('click', () => showShopAddModal(allProds));
    // ↓ fall through to event delegation (no return here!)

  } else {
    // ── 在庫モード HTML ───────────────────────────────────────────
    if (S.query) {
      const terms = S.query.toLowerCase().split(/\s+/).filter(Boolean);
      prods = prods.filter(p => {
        const hay = [p.name, p.unit, p.volume_unit].join(' ').toLowerCase();
        return terms.every(t => hay.includes(t));
      });
    }
    if (S.filterMode === 'soon') {
      prods = prods.filter(p => {
        if (!p.track_stock) return false;
        const d = calcConsumptionStats(p).bestDays;
        return d !== null && d <= 20;
      });
      prods.sort((a,b) => (calcConsumptionStats(a).bestDays??999) - (calcConsumptionStats(b).bestDays??999));
    } else {
      prods.sort((a,b) => {
        if (S.sort==='name')     return a.name.localeCompare(b.name,'ja');
        if (S.sort==='qty_asc')  return a.displayQty - b.displayQty;
        if (S.sort==='qty_desc') return b.displayQty - a.displayQty;
        if (S.sort==='updated')  return new Date(b.updated_at)-new Date(a.updated_at);
        return 0;
      });
    }
    if (S.categoryFilter) {
      prods = prods.filter(p => (S.categoryMap[p.group_id] || '') === S.categoryFilter);
    }
    const low = prods.filter(p=>p.isLow);
    let html = '';
    if (S.filterMode === 'soon') {
      html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 4px 10px;">
        <span style="background:var(--warn);color:var(--bg);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;">⏰ 20日以内</span>
        <span style="font-size:12px;color:var(--muted);">${prods.length}件</span>
        <button id="clear-filter" style="margin-left:auto;font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;padding:4px 10px;">✕ 解除</button>
      </div>`;
    }
    if (low.length) {
      html += `<div class="alert-banner" id="ab">
        <span class="ab-icon">⚠️</span>
        <div class="ab-text">在庫アラート <strong>${low.length}件</strong> が少なくなっています</div>
        <span style="color:var(--warn)">›</span>
      </div>`;
    }
    if (!prods.length) {
      const emptyIcon = S.filterMode==='soon' ? '🎉' : S.categoryFilter ? (S.categoryFilter==='food'?'🍱':'🧴') : '📦';
      const emptyMsg  = S.filterMode==='soon' ? '20日以内に切れる商品はありません'
        : S.query ? '該当する商品が見つかりません'
        : S.categoryFilter ? 'このカテゴリに商品がありません<br>商品登録時にカテゴリを設定してください'
        : '商品がまだ登録されていません<br>＋ ボタンから追加してください';
      html += `<div class="empty"><div class="ei">${emptyIcon}</div><p>${emptyMsg}</p></div>`;
    } else {
      html += prods.map(p => {
        const priceOnly = !p.track_stock;
        const stats = calcConsumptionStats(p);
        const d = stats.bestDays;
        const daysHtml = (!priceOnly && d !== null) ? (() => { const col = d < 7 ? 'var(--danger)' : d < 30 ? 'var(--warn)' : 'var(--accent)'; return ` · <span style="color:${col};">あと約${d}日</span>`; })() : '';
        const cycle = priceOnly ? null : calcPurchaseCycle(p);
        const cycleHtml = cycle && cycle.daysUntilDue < 0
          ? ` · <span style="color:var(--warn);font-weight:600;">🔔 購入時期</span>`
          : (cycle && cycle.daysUntilDue <= 7
            ? ` · <span style="color:var(--warn);">📅 あと${cycle.daysUntilDue}日で次回</span>`
            : '');
        return `
        <div class="product-item ${p.isLow?'low':''}" data-gid="${esc(p.group_id)}">
          <div class="pi-info">
            <div class="pi-name">
              ${esc(p.name)}
              ${p.isLow ? '<span class="alert-badge">少</span>' : ''}
              ${priceOnly ? '<span class="alert-badge" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);">価格</span>' : ''}
            </div>
            <div class="pi-meta">
              ${p.latestPrice ? `¥${p.latestPrice.toLocaleString()}` : ''}
              ${p.unitPrice ? ` · <span style="color:var(--accent);">¥${p.unitPrice.toFixed(1)}/${esc(p.volume_unit||p.unit)}</span>` : ''}
              ${!priceOnly && p.stockValue ? ` · 計¥${Math.round(p.stockValue).toLocaleString()}` : ''}
              ${!priceOnly && !p.latestPrice ? `しきい値: ${p.alert_threshold}${esc(p.unit)}` : ''}
              ${daysHtml}${cycleHtml}
              ${priceOnly ? '' : ` · ${relDate(p.updated_at)}`}
            </div>
          </div>
          <div class="pi-qty-wrap">
            ${priceOnly
              ? `<div class="pi-qty" style="font-size:13px;color:var(--muted);">💰</div><div class="pi-unit">価格</div>`
              : `<div class="pi-qty ${p.isLow?'low':''}" style="${p.virtualQty!==null?'font-size:18px;':''}">
                  ${p.virtualQty !== null ? p.displayQty.toFixed(1) : p.qty}
                </div>
                <div class="pi-unit">${esc(p.unit)}${p.virtualQty!==null?'<span style="font-size:9px;color:var(--warn);display:block;line-height:1;">推定</span>':''}</div>`}
          </div>
          <div class="pi-btns">
            ${priceOnly ? '' : '<button class="qbtn qp" title="+1">＋</button><button class="qbtn qm" title="-1">－</button>'}
            ${priceOnly
              ? `<button class="shop-flag" data-gid="${p.group_id}" title="買い物リストに追加/外す"
                   style="background:${S.shopFlags.has(String(p.group_id))?'var(--accent)':'var(--surface2)'};border:1px solid ${S.shopFlags.has(String(p.group_id))?'var(--accent)':'var(--border)'};border-radius:8px;font-size:15px;cursor:pointer;padding:6px 10px;color:${S.shopFlags.has(String(p.group_id))?'var(--bg)':'var(--muted)'};">
                   🛒
                 </button>`
              : `<button class="shop-flag" data-gid="${p.group_id}" title="買い物リストに追加/外す"
                   style="background:none;border:none;font-size:18px;cursor:pointer;padding:4px;opacity:${S.shopFlags.has(String(p.group_id))?'1':'0.3'};">🛒</button>`}
          </div>
        </div>`;
      }).join('');
    }
    el.innerHTML = html;
    document.getElementById('ab')?.addEventListener('click', () => { S.sort='qty_asc'; localStorage.setItem('stockr_sort','qty_asc'); if(document.getElementById('sort-btn')) document.getElementById('sort-btn').textContent=sortLabel(); S.query=''; if(document.getElementById('q')) document.getElementById('q').value=''; paintHomeList(); });
  }

  // ── 共通イベントデリゲーション（両モードで必ず実行） ─────────
  el._clickHandler && el.removeEventListener('click', el._clickHandler);
  el._clickHandler = e => {
    if (e.target.id === 'clear-filter') {
      S.filterMode = '';
      const btn = document.getElementById('soon-btn');
      if (btn) btn.style.cssText = 'font-size:16px;padding:9px 10px;';
      paintHomeList(); return;
    }
    if (e.target.closest('.shop-buy')) {
      const gid = e.target.closest('.shop-buy').dataset.gid;
      const prod = prods.find(x => String(x.group_id) === gid);
      if (!prod) return;
      if (prod.track_stock) { go('action', {activeProduct:prod, actionMode:'in', actionInput:''}); }
      else { S.shopFlags.delete(gid); saveShopFlags(); paintHomeList(); }
      return;
    }
    if (e.target.closest('.shop-remove')) {
      const gid = e.target.closest('.shop-remove').dataset.gid;
      S.shopFlags.delete(gid); saveShopFlags(); paintHomeList(); return;
    }
    if (e.target.closest('.shop-flag')) {
      const gid = e.target.closest('.shop-flag').dataset.gid;
      if (S.shopFlags.has(gid)) { S.shopFlags.delete(gid); } else { S.shopFlags.add(gid); }
      saveShopFlags();
      e.target.closest('.shop-flag').style.opacity = S.shopFlags.has(gid) ? '1' : '0.3';
      return;
    }
    const row = e.target.closest('.product-item');
    if (!row) return;
    const p = prods.find(x => String(x.group_id) === row.dataset.gid);
    if (!p) return;
    if (e.target.closest('.qp')) { quickStock(p, 'in',  1); return; }
    if (e.target.closest('.qm')) { quickStock(p, 'out', 1); return; }
    go('action', {activeProduct:p, actionMode: (S.viewMode==='shop' && p.track_stock) ? 'in' : 'out', actionInput:''});
  };
  el.addEventListener('click', el._clickHandler);
}
// 買い物モード: 商品を追加するモーダル
function showShopAddModal(allProds) {
  const ov = document.createElement('div'); ov.className = 'overlay';
  const renderList = (q) => {
    const term = q.toLowerCase();
    const filtered = allProds.filter(p =>
      (!term || p.name.toLowerCase().includes(term))
    ).sort((a,b) => a.name.localeCompare(b.name,'ja'));
    return filtered.map(p => {
      const flagged = S.shopFlags.has(String(p.group_id));
      const sub = p.track_stock
        ? (calcDaysRemaining(p) !== null ? `残${calcDaysRemaining(p)}日` : `${p.qty}${esc(p.unit)}`)
        : '価格のみ';
      return `<button class="btn ${flagged?'btn-primary':'btn-secondary'} shop-modal-item"
        data-gid="${p.group_id}" style="text-align:left;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;">
        <span>
          <span style="font-weight:700;">${esc(p.name)}</span>
          <span style="font-size:11px;color:${flagged?'var(--on-accent-soft)':'var(--muted)'};margin-left:8px;">${sub}</span>
        </span>
        <span style="font-size:18px;margin-left:8px;">${flagged?'✓':'＋'}</span>
      </button>`;
    }).join('') || '<p style="text-align:center;color:var(--muted);padding:16px;">商品が見つかりません</p>';
  };
  ov.innerHTML = `<div class="modal"><div class="modal-handle"></div>
    <h2 style="margin-bottom:12px;">🛒 買い物リストに追加</h2>
    <input class="form-input" id="shop-modal-q" type="text" placeholder="🔍 商品名で検索…" style="margin-bottom:12px;" autocomplete="off">
    <div id="shop-modal-list" style="max-height:55vh;overflow-y:auto;">${renderList('')}</div>
    <button class="btn btn-secondary" id="shop-modal-close" style="margin-top:8px;">閉じる</button>
  </div>`;
  document.body.appendChild(ov);
  const listEl = document.getElementById('shop-modal-list');
  document.getElementById('shop-modal-q').addEventListener('input', e => {
    listEl.innerHTML = renderList(e.target.value);
  });
  ov.addEventListener('click', e => {
    if (e.target.id === 'shop-modal-close' || e.target === ov) { ov.remove(); return; }
    const btn = e.target.closest('.shop-modal-item');
    if (!btn) return;
    const gid = btn.dataset.gid;
    if (S.shopFlags.has(gid)) { S.shopFlags.delete(gid); } else { S.shopFlags.add(gid); }
    saveShopFlags();
    // ボタンの見た目をその場で更新
    const p = allProds.find(x => String(x.group_id) === gid);
    const flagged = S.shopFlags.has(gid);
    const sub = p
      ? (p.track_stock ? (calcDaysRemaining(p) !== null ? `残${calcDaysRemaining(p)}日` : `${p.qty}${esc(p.unit)}`) : '価格のみ')
      : '';
    btn.className = `btn ${flagged?'btn-primary':'btn-secondary'} shop-modal-item`;
    btn.style.textAlign='left'; btn.style.marginBottom='8px'; btn.style.display='flex';
    btn.style.alignItems='center'; btn.style.justifyContent='space-between'; btn.style.padding='12px 14px';
    btn.innerHTML = `<span><span style="font-weight:700;">${esc(p?.name||gid)}</span><span style="font-size:11px;color:${flagged?'var(--on-accent-soft)':'var(--muted)'};margin-left:8px;">${sub}</span></span><span style="font-size:18px;margin-left:8px;">${flagged?'✓':'＋'}</span>`;
    paintHomeList(); // バックグラウンドでリスト更新
  });
}

async function quickStock(p, action, qty) {
  if (S.quickLock[p.group_id]) return; // 連続クリック防止
  S.quickLock[p.group_id] = true;

  // ボタンを一時的に暗くして無効化
  const row = document.querySelector(`.product-item[data-gid="${p.group_id}"]`);
  const btns = row?.querySelectorAll('.qbtn');
  btns?.forEach(b => { b.disabled = true; b.style.opacity = '0.3'; });

  try {
    if (S.url==='DEMO') {
      const inv = S.cache.inventory.find(r=>r.group_id===p.group_id);
      if (inv) {
        if (action==='in')  inv.qty += qty;
        if (action==='out') inv.qty = Math.max(0, inv.qty-qty);
        inv.updated_at = new Date().toLocaleString('ja-JP');
      }
      S.cache.history = S.cache.history || [];
      S.cache.history.unshift({timestamp:new Date().toLocaleString('ja-JP'), group_id:p.group_id, product_name:p.name, barcode:'', action, qty, after_qty:inv?.qty??0, store_name:'', price:'', user:S.user});
      toast(`${p.name}: ${action==='in'?'+':'-'}${qty}${p.unit}`);
      paintHomeList();
    } else {
      const res = await apiPost({action:'stockAction', group_id:p.group_id, product_name:p.name, barcode:'', move:action, qty, user:S.user});
      if (res.ok) {
        toast(`${p.name}: ${action==='in'?'+':'-'}${qty}${p.unit}`);
        const inv = (S.cache?.inventory||[]).find(r => String(r.group_id)===String(p.group_id));
        if (inv) { inv.qty = res.afterQty ?? (action==='in' ? (Number(inv.qty)+qty) : Math.max(0, Number(inv.qty)-qty)); inv.updated_at = new Date().toLocaleString('ja-JP'); }
        if (S.cache) S.cache.history = [{timestamp:new Date().toLocaleString('ja-JP'), group_id:p.group_id, product_name:p.name, barcode:'', action, qty, after_qty:inv?.qty??0, store_name:'', price:'', memo:'', user:S.user}, ...(S.cache.history||[])].slice(0,200);
        saveLocalCache();
        paintHomeList();
        bgRefresh();
      } else toast(res.error||'エラー','err');
    }
  } catch(e) { toast('通信エラー: '+e.message,'err'); }

  S.quickLock[p.group_id] = false;
  btns?.forEach(b => { b.disabled = false; b.style.opacity = ''; });
}
function showSortModal() {
  const opts = [{id:'name',label:'名前順'},{id:'qty_asc',label:'在庫少ない順'},{id:'qty_desc',label:'在庫多い順'},{id:'updated',label:'最終更新順'}];
  const ov = document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-handle"></div><h2>並び替え</h2>
    ${opts.map(o=>`<button class="btn ${S.sort===o.id?'btn-primary':'btn-secondary'} so" data-id="${o.id}">${o.label}</button>`).join('')}
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => {
    const b = e.target.closest('.so');
    if (b) {
      // 選択ボタンを即座に強調表示
      ov.querySelectorAll('.so').forEach(btn => {
        btn.className = `btn ${btn === b ? 'btn-primary' : 'btn-secondary'} so`;
      });
      S.sort=b.dataset.id; localStorage.setItem('stockr_sort',S.sort);
      document.getElementById('sort-btn').textContent=sortLabel(); paintHomeList();
      setTimeout(() => ov.remove(), 150); // 色変化を見せてから閉じる
    } else if (e.target===ov) { ov.remove(); }
  });
}

// STOCK ACTION SCREEN

function renderAction() {
  const p = S.activeProduct;
  if (!p) return '<div class="empty"><div class="ei">❌</div><p>商品が選択されていません</p></div>';

  // 価格のみ商品（在庫管理しない）
  if (!p.track_stock) {
    return `
      <div class="action-wrap">
        <div class="qty-display">
          <div class="ql" style="color:var(--muted);">価格確認のみ</div>
          ${p.latestPrice ? `<div class="qn" style="font-size:28px;">¥${p.latestPrice.toLocaleString()}</div>` : '<div class="qn" style="font-size:20px;color:var(--muted);">未登録</div>'}
          <div class="qu">${p.latestStore ? esc(p.latestStore) : ''}</div>
        </div>
        <button class="btn btn-primary" id="act-price-record" style="margin:0 16px 12px;">💰 価格を記録</button>
        <div id="act-price-hist" style="padding:0 16px;"></div>
        <div class="divider"></div>
        <div class="product-actions-row">
          <span style="font-size:12px;color:var(--muted);margin-right:auto;">この商品：</span>
          <button class="icon-btn edit" id="edit-prod">✏️ 編集</button>
          <button class="icon-btn delete" id="del-prod">🗑 削除</button>
        </div>
      </div>`;
  }

  // 消費日数表示
  const stats = calcConsumptionStats(p);
  let daysInfo = '';
  if (p.alert_mode === 'days' && (stats.bestDays !== null || p.manual_days_per_unit > 0)) {
    const manualDays = p.manual_days_per_unit > 0 ? Math.round(p.qty * p.manual_days_per_unit) : null;
    const estDays = stats.bestDays;
    daysInfo = `<div class="qa" style="background:var(--accent-tint-weak);color:var(--accent);">📅 残り推定: ${manualDays??estDays??'?'} 日${manualDays && estDays ? ` （実績: ${estDays}日）` : ''}</div>`;
  }

  return `

// 換算ヒントをリアルタイム更新
function updateVolConvHint() {
  const p = S.activeProduct; if (!p) return;
  const defaultVol = Number(p.volume) || 0; if (!defaultVol) return;
  const lotVolEl = document.getElementById('lot-vol'); if (!lotVolEl) return;
  const lotVol   = parseFloat(lotVolEl.value) || defaultVol;
  const hint     = document.getElementById('vol-conv-hint'); if (!hint) return;
  const factor   = lotVol / defaultVol;
  const physQty  = parseInt(S.actionInput) || 0;
  const volUnit  = p.volume_unit || p.unit || '';
  if (Math.abs(factor - 1) > 0.001) {
    const effective = Math.round(physQty * factor * 10) / 10;
    hint.innerHTML  = `<span style="color:var(--warn);">⚠ 換算あり: ${physQty}個 × ${factor.toFixed(2)} = 実質 <strong>${effective}個分</strong> として加算</span>`;
  } else {
    hint.textContent = `デフォルト容量と同じ (${defaultVol}${volUnit})`;
    hint.style.color = '';
  }
}
function bindAction() {
  const p = S.activeProduct; if (!p) return;
  document.getElementById('back-btn')?.addEventListener('click', () => go('home'));
  document.getElementById('edit-prod').addEventListener('click', () => go('add',{editProduct:p}));
  document.getElementById('del-prod').addEventListener('click', () => confirmDelete(p));

  // 価格のみ商品モード
  if (!p.track_stock) {
    document.getElementById('act-price-record')?.addEventListener('click', () => showPriceRecord(p));
    const ph = renderPriceHistory(p);
    const el = document.getElementById('act-price-hist');
    if (el) el.innerHTML = ph;
    return;
  }

  // Mode tabs
  document.querySelectorAll('.mode-tab').forEach(tab => tab.addEventListener('click', () => {
    S.actionMode = tab.dataset.mode; S.actionInput = '';
    document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===S.actionMode));
    document.getElementById('action-disp').textContent = '0';
    document.getElementById('act-extras').innerHTML = renderExtras();
    bindExtrasListeners();
  }));

  // Numpad — キー押下時に換算ヒントも更新
  document.querySelectorAll('.nk').forEach(k => k.addEventListener('click', () => {
    const key = k.dataset.k;
    if (key==='⌫') S.actionInput = S.actionInput.slice(0,-1);
    else if (S.actionInput.length < 5) S.actionInput += key;
    document.getElementById('action-disp').textContent = S.actionInput||'0';
    updateVolConvHint();
  }));

  document.getElementById('act-cancel').addEventListener('click', () => { S.actionInput=''; go('home'); });
  document.getElementById('act-confirm').addEventListener('click', () => doStockAction(p));

  document.getElementById('act-extras').innerHTML = renderExtras();
  bindExtrasListeners();
  const ph  = renderPriceHistory(p);
  document.getElementById('act-price-hist').innerHTML = `<div style="padding:0 2px 8px;">${ph || ''}</div>`;

  // 購入サイクルセクション
  const cycle = calcPurchaseCycle(p);
  const cycleEl = document.getElementById('act-cycle');
  if (cycleEl && cycle) {
    const nextStr = cycle.nextDue.toLocaleDateString('ja-JP', {month:'numeric', day:'numeric'});
    const overdue = cycle.daysUntilDue < 0;
    const showDev = cycle.deviationPct !== null && Math.abs(cycle.deviationPct) >= 20;
    cycleEl.innerHTML = `
      <div style="padding:12px 16px;background:var(--surface2);border-radius:10px;margin:8px 0;font-size:13px;">
        <div style="font-weight:700;margin-bottom:6px;color:var(--accent);">🔄 購入サイクル（自動計算）</div>
        <div style="color:var(--muted);margin-bottom:4px;">約${cycle.avgCycleDays}日ごとに購入（${cycle.histCount}回の記録）</div>
        <div style="${overdue ? 'color:var(--warn);font-weight:600;' : ''}">
          ${overdue
            ? `⚠️ 次回購入時期を${Math.abs(cycle.daysUntilDue)}日過ぎています`
            : `📅 次回目安: ${nextStr}（あと${cycle.daysUntilDue}日）`}
        </div>
        ${showDev ? `<div style="color:var(--warn);margin-top:4px;font-size:12px;">実績と手動設定が${cycle.deviationPct > 0 ? '+' : ''}${cycle.deviationPct}%ずれています</div>` : ''}
      </div>`;
  }
}

// エクストラフォームのリスナーをまとめてバインド
function bindExtrasListeners() {
  document.getElementById('lot-vol')?.addEventListener('input', updateVolConvHint);
  document.getElementById('act-price-only')?.addEventListener('click', () => showPriceRecord(S.activeProduct));
}
async function doStockAction(p) {
  if (S.confirmLock) return;
  const physQty = parseInt(S.actionInput) || 0;
  if (physQty === 0 && S.actionMode !== 'set') { toast('数量を入力してください','err'); return; }
  if (physQty === 0 && S.actionMode === 'set') {
    if (!confirm('在庫を 0 にセットしますか？')) return;
  }
  // 確定ボタンを7秒ロック（GAS処理中の連打による多重登録を防ぐ）
  S.confirmLock = true;
  const btn = document.getElementById('act-confirm');
  if (btn) { btn.disabled = true; btn.textContent = '処理中… (7)'; }
  let remaining = 6;
  S.confirmLockTimer = setInterval(() => {
    const b = document.getElementById('act-confirm');
    if (remaining <= 0) {
      clearInterval(S.confirmLockTimer); S.confirmLockTimer = null; S.confirmLock = false;
      if (b) { b.disabled = false; b.textContent = '確　定'; }
    } else {
      if (b) b.textContent = `処理中… (${remaining})`;
      remaining--;
    }
  }, 1000);

  const storeName = document.getElementById('store-in')?.value?.trim() || '';
  const price     = document.getElementById('price-in')?.value?.trim() || '';
  const memo      = document.getElementById('memo-in')?.value?.trim() || '';

  // 容量換算（入庫のみ・容量設定がある商品のみ）
  const defaultVol = Number(p.volume) || 0;
  const lotVolEl   = document.getElementById('lot-vol');
  const lotVol     = (defaultVol > 0 && lotVolEl) ? (parseFloat(lotVolEl.value) || defaultVol) : defaultVol;
  const convFactor = (defaultVol > 0 && lotVol > 0 && S.actionMode === 'in') ? lotVol / defaultVol : 1;
  const qty        = Math.abs(convFactor - 1) > 0.001
    ? Math.round(physQty * convFactor * 10) / 10
    : physQty;
  const lotNote    = Math.abs(convFactor - 1) > 0.001
    ? ` (${physQty}個×${convFactor.toFixed(2)}→実質${qty}個分)` : '';

  if (S.url==='DEMO') {
    const inv = S.cache.inventory.find(r=>r.group_id===p.group_id);
    if (inv) {
      const before = inv.qty;
      if (S.actionMode==='in') {
        // 仮想消費量があればそれをベースに加算（小数点在庫を保持）
        const base = (p.virtualQty !== null) ? p.virtualQty : inv.qty;
        inv.qty = Math.round((base + qty) * 10) / 10;
      }
      if (S.actionMode==='out') inv.qty = Math.max(0, inv.qty-qty);
      if (S.actionMode==='set') inv.qty = Math.max(0, qty);
      inv.updated_at = new Date().toLocaleString('ja-JP');
      const lotVolRecord = (S.actionMode === 'in' && Math.abs(convFactor - 1) > 0.001) ? lotVol : null;
      S.cache.history.unshift({timestamp:new Date().toLocaleString('ja-JP'), group_id:p.group_id, product_name:p.name, barcode:'', action:S.actionMode, qty, phys_qty:physQty, lot_volume:lotVolRecord, after_qty:inv.qty, store_name:storeName, price, memo, user:S.user});
    }
    // 入庫時に店舗・価格が入力されていればバーコードテーブルにも反映
    if (S.actionMode === 'in' && storeName && price) {
      S.cache.barcodes = S.cache.barcodes || [];
      const existBc = S.cache.barcodes.find(b => String(b.group_id) === String(p.group_id) && b.store_name === storeName);
      if (existBc) { existBc.price = price; }
      else { S.cache.barcodes.push({barcode:`manual_${Date.now()}`, group_id:p.group_id, store_name:storeName, price, memo:'', created_at:new Date().toLocaleString('ja-JP')}); }
    }
    if (S.actionMode === 'in') { S.shopFlags.delete(String(p.group_id)); saveShopFlags(); }
    toast(`更新しました（デモ）${lotNote}`);
    S.actionInput=''; go('home'); return;
  }
  try {
    const lotVolRecord = (S.actionMode === 'in' && Math.abs(convFactor - 1) > 0.001) ? lotVol : null;
    // 仮想消費量がある場合、GASに pre_virtual_qty を渡してベース加算してもらう（履歴はinのまま）
    const preVirtualQty = (S.actionMode === 'in' && p.virtualQty !== null) ? p.virtualQty : undefined;
    const res = await apiPost({action:'stockAction', group_id:p.group_id, product_name:p.name,
      barcode:'', move:S.actionMode, qty, phys_qty:physQty, lot_volume:lotVolRecord,
      pre_virtual_qty:preVirtualQty, store_name:storeName, price, memo, user:S.user});
    if (res.ok) {
      // ローカルキャッシュを即時更新（GAS再取得を待たない）
      const inv = (S.cache?.inventory||[]).find(r => String(r.group_id)===String(p.group_id));
      if (inv) inv.qty = res.afterQty;
      if (S.cache) {
        S.cache.history = [{timestamp:new Date().toLocaleString('ja-JP'), group_id:p.group_id, product_name:p.name,
          barcode:'', action:S.actionMode, qty, after_qty:res.afterQty,
          store_name:storeName, price, memo, user:S.user}, ...(S.cache.history||[])].slice(0,200);
        if (S.actionMode==='in' && storeName && price) {
          const existBc = (S.cache.barcodes||[]).find(b=>String(b.group_id)===String(p.group_id)&&b.store_name===storeName);
          if (existBc) existBc.price = price;
          else (S.cache.barcodes=S.cache.barcodes||[]).push({barcode:`manual_${Date.now()}`, group_id:p.group_id, store_name:storeName, price, memo:'', created_at:new Date().toLocaleString('ja-JP')});
        }
      }
      if (S.actionMode === 'in') { S.shopFlags.delete(String(p.group_id)); saveShopFlags(); }
      saveLocalCache();
      toast(`${p.name} → ${res.afterQty}${p.unit}${lotNote}`);
      S.actionInput=''; go('home');
      bgRefresh();
    } else toast(res.error||'エラー','err');
  } catch(e) { toast('通信エラー: '+e.message,'err'); }
}
function confirmDelete(p) {
  const ov = document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-handle"></div>
    <h2>🗑 商品を削除</h2>
    <p style="font-size:14px;color:var(--muted);margin-bottom:20px;">「${esc(p.name)}」を削除しますか？<br>バーコード・在庫も削除されます。操作履歴は残ります。</p>
    <button class="btn btn-danger" id="cd-yes">削除する</button>
    <button class="btn btn-secondary" id="cd-no">キャンセル</button>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('cd-yes').addEventListener('click', async () => {
    ov.remove();
    if (S.url==='DEMO') {
      S.cache.products  = S.cache.products.filter(x=>x.group_id!==p.group_id);
      S.cache.inventory = S.cache.inventory.filter(x=>x.group_id!==p.group_id);
      S.cache.barcodes  = S.cache.barcodes.filter(x=>x.group_id!==p.group_id);
      toast('削除しました（デモ）'); go('home'); return;
    }
    try {
      const res = await apiPost({action:'deleteProduct', group_id:p.group_id});
      if (res.ok) { toast('削除しました'); const fresh=await getAllData(true); if(fresh?.ok) S.cache=fresh; go('home'); }
      else toast(res.error||'エラー','err');
    } catch(e) { toast('通信エラー','err'); }
  });
  document.getElementById('cd-no').addEventListener('click', ()=>ov.remove());
}

      </div>
      ` : ''}
      <button class="btn btn-primary" id="a-save">${p?'保存する':'登録する'}</button>
    </div>
  `;
}
function bindAdd() {
  document.getElementById('back-btn')?.addEventListener('click', () => go(S.editProduct?'action':'home'));
  document.getElementById('fill-cycle')?.addEventListener('click', () => {
    const cycle = calcPurchaseCycle(S.editProduct);

    }
  });

  // Category pills
  document.querySelectorAll('.cat-pill').forEach(pill => pill.addEventListener('click', () => {

    document.getElementById('a-category').value = pill.dataset.cat;
  }));

  // Unit pills
  document.querySelectorAll('.up').forEach(pill=>pill.addEventListener('click', () => {

    pill.classList.add('active');

  }));
  document.getElementById('a-unit')?.addEventListener('input', e => {

  document.querySelectorAll('.vup').forEach(pill => pill.addEventListener('click', () => {
    document.getElementById('a-vol-unit').value = pill.dataset.u;
    document.querySelectorAll('.vup').forEach(p => p.classList.toggle('active', p.dataset.u === pill.dataset.u));
  }));
  document.getElementById('a-vol-unit')?.addEventListener('input', e => {
    document.querySelectorAll('.vup').forEach(p => p.classList.toggle('active', p.dataset.u === e.target.value));
  });

  // アラートモードピル
  document.querySelectorAll('.amp').forEach(pill => pill.addEventListener('click', () => {
    const m = pill.dataset.m;
    document.querySelectorAll('.amp').forEach(p => p.classList.toggle('active', p.dataset.m === m));
    document.getElementById('a-alert-mode').value = m;
    document.getElementById('thr-group').style.display  = m === 'threshold' ? '' : 'none';
    document.getElementById('days-group').style.display = m === 'days'      ? '' : 'none';
  }));

  // 在庫タイプ切り替え
  document.getElementById('a-track')?.addEventListener('change', e => {
    document.getElementById('stock-mgmt-group').style.display = e.target.checked ? '' : 'none';
  });
  // 初期状態の反映
  const trackChk = document.getElementById('a-track');
  if (trackChk && !trackChk.checked) document.getElementById('stock-mgmt-group').style.display = 'none';

  // 容量変更時の在庫換算プレビュー（編集モードかつ既存在庫あり）
  const ep = S.editProduct;
  if (ep && Number(ep.volume) > 0 && ep.qty > 0) {
    const oldVol = Number(ep.volume), oldQty = ep.qty;
    document.getElementById('a-vol')?.addEventListener('input', e => {
      const newVol = parseFloat(e.target.value) || 0;
      const hint = document.getElementById('vol-recalc-hint');
      if (!hint) return;
      if (newVol > 0 && Math.abs(newVol - oldVol) > 0.001) {
        const newQty = Math.round(oldQty * (oldVol / newVol) * 10) / 10;
        hint.innerHTML = `<span style="color:var(--warn);">⚠ 容量変更により在庫を <strong>${oldQty}個 → ${newQty}個</strong> に自動換算します</span>`;
      } else {
        hint.textContent = ''; // 元の容量に戻したら消去
      }
    });
  }

  document.getElementById('a-save').addEventListener('click', saveProduct);
}
async function saveProduct() {
  if (S.saving) return;
  const name       = document.getElementById('a-name').value.trim();
  const unit       = document.getElementById('a-unit').value.trim() || '個';
  const thrStr     = document.getElementById('a-thr')?.value?.trim() ?? '';
  const thr        = thrStr !== '' ? Math.max(0, parseInt(thrStr)||0) : 0;
  const volume     = parseFloat(document.getElementById('a-vol')?.value) || 0;
  const volUnit    = document.getElementById('a-vol-unit')?.value?.trim() || '';
  const alertMode  = document.getElementById('a-alert-mode')?.value || 'threshold';
  const trackStock = document.getElementById('a-track')?.checked ?? true;
  // 消費日数（仮想消費）は「消費日数モード」かつ「在庫管理あり」の時だけ有効
  // 他モードに切り替えたら必ず0にクリアして仮想消費を停止する
  const manualDays = (alertMode === 'days' && trackStock)
    ? (parseFloat(document.getElementById('a-days')?.value) || 0)
    : 0;
  if (!name) { toast('商品名を入力してください','err'); return; }

  // ボタンを無効化して二重登録防止
  S.saving = true;
  const btn = document.getElementById('a-save');
  if (btn) { btn.disabled = true; btn.textContent = '登録中…'; }

  const isEdit = !!S.editProduct;
  const gid = isEdit ? S.editProduct.group_id : `prod_${Date.now()}`;

  // カテゴリをローカルに保存（サーバー不要）
  const category = document.getElementById('a-category')?.value || '';
  if (category) { S.categoryMap[gid] = category; } else { delete S.categoryMap[gid]; }
  try { localStorage.setItem('stockr_categories', JSON.stringify(S.categoryMap)); } catch(e) {}

  try {
    if (S.url==='DEMO') {
      if (isEdit) {
        const oldVol = Number(S.editProduct.volume) || 0;
        const oldQty = S.editProduct.qty || 0;
        const p = S.cache.products.find(x=>x.group_id===gid);
        if (p) { p.name=name; p.unit=unit; p.volume=volume; p.volume_unit=volUnit; p.track_stock=trackStock; p.manual_days_per_unit=manualDays; }
        const inv = S.cache.inventory.find(x=>x.group_id===gid);
        if (inv) {
          inv.alert_threshold = thr; inv.alert_mode = alertMode;
          if (oldVol > 0 && volume > 0 && Math.abs(volume - oldVol) > 0.001 && oldQty > 0) {
            const newQty = Math.round(oldQty * (oldVol / volume) * 10) / 10;
            inv.qty = newQty; inv.updated_at = new Date().toLocaleString('ja-JP');
            S.cache.history.unshift({timestamp:new Date().toLocaleString('ja-JP'), group_id:gid, product_name:name, barcode:'', action:'set', qty:newQty, after_qty:newQty, store_name:'', price:'', memo:'', user:S.user});
            toast(`在庫換算: ${oldQty}個 → ${newQty}個（デモ）`);
          }
        }
      } else {
        S.cache.products.push({group_id:gid, name, unit, volume, volume_unit:volUnit, track_stock:trackStock, manual_days_per_unit:manualDays, created_at:new Date().toLocaleString('ja-JP')});
        const qty = parseInt(document.getElementById('a-qty')?.value)||0;
        S.cache.inventory.push({group_id:gid, qty, alert_threshold:thr, alert_mode:alertMode, updated_at:new Date().toLocaleString('ja-JP')});
      }
      toast(isEdit?'更新しました（デモ）':'登録しました（デモ）');
      go('home'); return;
    }

    const r1 = await apiPost({action:'upsertProduct', group_id:gid, name, unit, volume, volume_unit:volUnit, track_stock:trackStock, manual_days_per_unit:manualDays});
    if (!r1.ok) { toast(r1.error||'エラー','err'); return; }
    const r2 = await apiPost({action:'setAlert', group_id:gid, threshold:thr, alert_mode:alertMode});
    if (!r2.ok) toast('しきい値の保存に失敗: '+(r2.error||'エラー'),'err');
    // 容量変更時の在庫自動換算（編集モードのみ）
    if (isEdit) {
      const oldVol = Number(S.editProduct.volume) || 0;
      const oldQty = S.editProduct.qty || 0;
      if (oldVol > 0 && volume > 0 && Math.abs(volume - oldVol) > 0.001 && oldQty > 0) {
        const newQty = Math.round(oldQty * (oldVol / volume) * 10) / 10;
        await apiPost({action:'stockAction', group_id:gid, product_name:name, barcode:'', move:'set', qty:newQty, user:S.user});
      }
    }
    if (!isEdit) {
      const qty       = parseInt(document.getElementById('a-qty')?.value)||0;
      const initPrice = document.getElementById('a-init-price')?.value?.trim() || '';
      const initStore = document.getElementById('a-init-store')?.value?.trim() || '';
      if (qty > 0) await apiPost({action:'stockAction', group_id:gid, product_name:name, barcode:'', move:'set', qty, user:S.user});
      // 初期価格が入力されていれば価格履歴として保存
      if (initPrice) {
        const bc = `price_${gid}`;
        await apiPost({action:'upsertBarcode', barcode:bc, group_id:gid, store_name:initStore, price:initPrice, memo:''});
      }
    }
    toast(isEdit?'更新しました':'登録しました');
    if (S.cache) {
      if (isEdit) {
        const prod = (S.cache.products||[]).find(p => String(p.group_id)===String(gid));
        if (prod) Object.assign(prod, {name, unit, volume, volume_unit:volUnit, track_stock:trackStock, manual_days_per_unit:manualDays});
        const inv2 = (S.cache.inventory||[]).find(p => String(p.group_id)===String(gid));
        if (inv2) { inv2.alert_threshold=thr; inv2.alert_mode=alertMode; inv2.updated_at=new Date().toLocaleString('ja-JP'); }
      } else {
        const qty2 = parseInt(document.getElementById('a-qty')?.value)||0;
        const initPrice2 = document.getElementById('a-init-price')?.value?.trim() || '';
        const initStore2 = document.getElementById('a-init-store')?.value?.trim() || '';
        S.cache.products = S.cache.products||[];
        S.cache.inventory = S.cache.inventory||[];
        S.cache.barcodes  = S.cache.barcodes||[];
        S.cache.products.push({group_id:gid, name, unit, volume, volume_unit:volUnit, track_stock:trackStock, manual_days_per_unit:manualDays, created_at:new Date().toLocaleString('ja-JP')});
        S.cache.inventory.push({group_id:gid, qty:qty2, alert_threshold:thr, alert_mode:alertMode, updated_at:new Date().toLocaleString('ja-JP')});
        if (initPrice2) S.cache.barcodes.push({barcode:`price_${gid}`, group_id:gid, store_name:initStore2, price:initPrice2, memo:'', created_at:new Date().toLocaleString('ja-JP')});
      }
      saveLocalCache();
    }
    bgRefresh();
    go('home');
  } catch(e) {
    toast('通信エラー: '+e.message,'err');
  } finally {
    S.saving = false;
    if (btn) { btn.disabled = false; btn.textContent = isEdit?'保存する':'登録する'; }
  }
}
