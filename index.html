function paintHistory() {
  const el=document.getElementById('hist-list'); if (!el) return;
  const data=S.cache;
  if (!data?.ok) { el.innerHTML=`<div class="empty"><div class="ei">⚠️</div><p>${esc(data?.error||'エラー')}</p></div>`; return; }
  if (S.histFilter === 'analytics') { paintHistoryAnalytics(el, data); return; }
  let hist = data.history||[];
  if (S.histFilter!=='all') hist=hist.filter(h=>h.action===S.histFilter);
  // キーワード検索
  const q = S.histSearch.trim().toLowerCase();
  if (q) {
    hist = hist.filter(h =>
      (h.product_name||'').toLowerCase().includes(q) ||
      (h.store_name||'').toLowerCase().includes(q) ||
      (h.memo||'').toLowerCase().includes(q) ||
      (h.user||'').toLowerCase().includes(q)
    );
  }
  // 検索クリアボタンの表示同期
  const clearBtn = document.getElementById('hist-search-clear');
  if (clearBtn) clearBtn.style.display = q ? 'block' : 'none';
  if (!hist.length) {
    el.innerHTML = q
      ? `<div class="empty"><div class="ei">🔍</div><p>「${esc(S.histSearch)}」に一致する履歴がありません</p></div>`
      : '<div class="empty"><div class="ei">📋</div><p>履歴がありません</p></div>';
    return;
  }
  const icon={in:'📥',out:'📤',set:'🔧'};
  const sign={in:'+',out:'−',set:'='};
  el.innerHTML = hist.map(h=>`
    <div class="hist-item">
      <div class="hist-icon ${h.action}">${icon[h.action]||'•'}</div>
      <div class="hist-body">
        <div class="hist-name">${esc(h.product_name||h.group_id)}</div>
        <div class="hist-meta">
          ${esc(h.user)} · ${relDate(h.timestamp)}${h.store_name?` · 🏪 ${esc(h.store_name)}`:''}${h.price?` · ¥${Number(h.price).toLocaleString()}`:''}
          ${h.memo?`<br><span style="color:var(--text);opacity:0.75;">📝 ${esc(h.memo)}</span>`:''}
        </div>
      </div>
      <div class="hist-right">
        <div class="hist-num ${h.action}">${sign[h.action]||''}${h.qty}</div>
        <div class="hist-after">→ ${h.after_qty}</div>
      </div>
    </div>`).join('');
}

function paintHistoryAnalytics(el, data) {
  const prods = buildProducts(data);
  const rows = prods.map(p => {
    const stats = calcConsumptionStats(p);
    const storePrices = calcStorePrices(p);
    if (stats.bestDays === null && !storePrices.length) return '';
    const daysCol = stats.bestDays === null ? 'var(--text)' : stats.bestDays < 7 ? 'var(--danger)' : stats.bestDays < 30 ? 'var(--warn)' : 'var(--accent)';
    return `<div class="card">
      <div style="font-weight:700;font-size:15px;margin-bottom:10px;">${esc(p.name)}</div>
      ${stats.bestDays !== null ? `
        <div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:10px;">
          <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">📅 消費予測</div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;">
            <span style="font-size:13px;color:var(--muted);">推定残日数</span>
            <span style="color:${daysCol};font-weight:800;font-size:20px;">約${stats.bestDays}日</span>
          </div>
          ${stats.avgDaysPerUnit !== null ? `<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;">
            <span style="color:var(--muted);">消費速度</span>
            <span>1${esc(p.unit)} あたり ${stats.avgDaysPerUnit.toFixed(1)}日</span>
          </div>` : ''}
          ${stats.purchaseCycleDays !== null ? `<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;">
            <span style="color:var(--muted);">平均購入サイクル</span>
            <span>${Math.round(stats.purchaseCycleDays)}日に1回</span>
          </div>` : ''}
          ${stats.daysFromOut !== null && stats.daysFromIn !== null && Math.abs(stats.daysFromOut - stats.daysFromIn) > 5 ? `
            <div style="font-size:11px;color:var(--muted);margin-top:6px;border-top:1px solid var(--border);padding-top:6px;">
              出庫記録ベース: 約${stats.daysFromOut}日 / 購入サイクルベース: 約${stats.daysFromIn}日
            </div>` : ''}
        </div>` : ''}
      ${storePrices.length ? `
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">🏪 店舗別価格比較</div>
          ${storePrices.map((s, i) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;">
              <div>
                <span>${i===0?'🥇 ':''}${esc(s.store)}</span>
                ${s.count > 1 ? `<span style="font-size:10px;color:var(--muted);margin-left:6px;">${s.count}回記録</span>` : ''}
              </div>
              <div style="text-align:right;">
                <div>
                  <span style="color:${i===0?'var(--accent)':'var(--text)'};font-weight:700;">¥${s.min.toLocaleString()}</span>
                  ${s.count > 1 && s.max !== s.min ? `<span style="color:var(--muted);font-size:11px;"> 〜 ¥${s.max.toLocaleString()}</span>` : ''}
                </div>
                ${s.unitPrice ? `<div style="font-size:11px;color:var(--muted);">¥${s.unitPrice.toFixed(1)}/${esc(p.volume_unit||p.unit)}</div>` : ''}
                ${s.count > 1 && Math.round(s.avg) !== s.min ? `<div style="font-size:11px;color:var(--muted);">平均 ¥${Math.round(s.avg).toLocaleString()}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>` : ''}
    </div>`;
  }).filter(Boolean).join('');
  el.innerHTML = rows
    ? `<div style="padding:8px 0 4px;font-size:11px;color:var(--muted);text-align:center;">入庫・出庫履歴から自動算出</div>${rows}`
    : `<div class="empty"><div class="ei">📊</div><p>履歴データが少ないため分析できません<br><span style="font-size:12px;">入庫・出庫を記録すると<br>消費予測・価格比較が表示されます</span></p></div>`;
}

    localStorage.setItem('stockr_user', user);
    localStorage.setItem('stockr_url',  S.url);
    S.cache=null; S.cacheTime=0;
    if (S.url==='DEMO') { S.cache=makeDemoData(); S.cacheTime=Date.now(); }
    toast('設定を保存しました');
  });
  document.getElementById('st-test').addEventListener('click', async () => {
    const url = document.getElementById('st-url').value.trim();
    if (!url) { toast('URL を入力してください','err'); return; }
    try {
      const res = await fetch(`${url}?action=ping`);
      const data = await res.json();
      if (data.ok) toast('✅ 接続成功: '+data.message);
      else toast('⚠️ 応答あり: '+JSON.stringify(data),'info');
    } catch(e) { toast('❌ 接続失敗: '+e.message,'err'); }
  });
  document.getElementById('st-refresh').addEventListener('click', async () => {
    S.cache=null; S.cacheTime=0;
    if (S.url==='DEMO') { S.cache=makeDemoData(); S.cacheTime=Date.now(); toast('デモデータをリセットしました'); return; }
    const d=await getAllData(true);
    if (d?.ok) { S.cache=d; toast('データを再読み込みしました'); }
    else toast(d?.error||'エラー','err');
  });
  document.getElementById('st-migrate')?.addEventListener('click', async () => {
    if (S.url==='DEMO') { toast('デモモードでは使用できません','err'); return; }
    const btn = document.getElementById('st-migrate');
    btn.disabled=true; btn.textContent='更新中…';
    try {
      const res = await fetch(`${S.url}?action=migrate`);
      const data = await res.json();
      if (data.ok) toast(data.added?.length ? `列を追加しました: ${data.added.join(', ')}` : '✅ スキーマは最新です');
      else toast('エラー: '+(data.error||'不明'),'err');
    } catch(e) { toast('通信エラー: '+e.message,'err'); }
    finally { btn.disabled=false; btn.textContent='🔧 スプレッドシートを最新スキーマに更新'; }
  });
  document.getElementById('st-reset').addEventListener('click', () => {
    if (!confirm('アプリの設定をリセットしますか？\n（スプレッドシートのデータは削除されません）')) return;
    localStorage.clear();
    S.url=''; S.user=''; S.cache=null;
    render();
  });

  // 店舗名管理
  function renderStoreMgmt() {
    const el = document.getElementById('store-manage-list'); if (!el) return;
    // 全店舗（非表示含む）
    const allStores = new Set();
    (S.cache?.barcodes || []).forEach(b => { if (b.store_name) allStores.add(String(b.store_name)); });
    (S.cache?.history  || []).forEach(h => { if (h.store_name) allStores.add(String(h.store_name)); });
    const sorted = [...allStores].sort();
    if (!sorted.length) { el.innerHTML = '<div style="font-size:13px;color:var(--muted);">登録された店舗名はありません</div>'; return; }
    el.innerHTML = sorted.map(s => {
      const hidden = S.storeIgnoreList.includes(s);
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:14px;${hidden?'color:var(--muted);text-decoration:line-through;':''}">${esc(s)}</span>
        <button class="btn ${hidden?'btn-secondary':'btn-ghost'} store-hide-btn" data-store="${esc(s)}"
          style="font-size:12px;padding:5px 12px;width:auto;">${hidden?'表示に戻す':'非表示'}</button>
      </div>`;
    }).join('');
    el.querySelectorAll('.store-hide-btn').forEach(btn => btn.addEventListener('click', () => {
      const store = btn.dataset.store;
      const idx = S.storeIgnoreList.indexOf(store);
      if (idx >= 0) S.storeIgnoreList.splice(idx, 1);
      else S.storeIgnoreList.push(store);
      try { localStorage.setItem('stockr_ignored_stores', JSON.stringify(S.storeIgnoreList)); } catch(e) {}
      renderStoreMgmt();
      toast(idx >= 0 ? `「${store}」を表示に戻しました` : `「${store}」を非表示にしました`, 'info');
    }));
  }
  renderStoreMgmt();
  // キャッシュ取得後に再描画
  if (!S.cache) {
    getAllData().then(d => { if (d?.ok) { S.cache = d; renderStoreMgmt(); } });
  }
}

// ============================================================
// INIT
// ============================================================
// テーマ用metaタグを実際の状態に同期（data-theme属性は<head>内スクリプトで既に確定済み）
applyTheme(S.theme);

// Step1: 前回のlocalStorageキャッシュを即座に読み込んで起動を高速化
if (S.url && S.url !== 'DEMO') {
  try {
    const stored = localStorage.getItem('stockr_cache');
    if (stored) {
      const { data, time } = JSON.parse(stored);
      if (data?.ok) { S.cache = data; S.cacheTime = time; }
    }
  } catch(e) {}
}
render();

// Step2: バックグラウンドでGASウォームアップ + データ最新化
if (S.url && S.url !== 'DEMO') {
  const cacheAge = Date.now() - S.cacheTime;
  const FRESH_TTL = 3 * 60 * 1000; // 3分以内なら再取得不要

  if (!S.cache || cacheAge > FRESH_TTL) {
    // キャッシュが古い or ない → GASから最新データ取得
    getAllData(true).then(d => {
      if (d?.ok) { S.cache = d; checkMultiUserUpdates(d); paintHomeList?.(); }
    });
  } else {
    // キャッシュが新鮮 → GASをウォームアップだけして次回を高速化
    fetch(`${S.url}?action=ping`).catch(() => {});
  }
}
</script>
</body>
</html>
